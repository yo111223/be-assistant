<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日待办小助手 ✨</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Microsoft YaHei', sans-serif;
    background: linear-gradient(160deg, #fff0f5 0%, #fff8fb 60%, #fce4ec 100%);
    min-height: 100vh;
    padding: 20px;
    color: #6b4f5e;
  }

  .container { max-width: 600px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 24px; }
  .header h1 { font-size: 1.8rem; color: #f472b6; margin-bottom: 4px; }
  .header .date { font-size: 0.9rem; color: #f9a8d4; }

  /* 输入区 */
  .input-card {
    background: white;
    border-radius: 24px;
    padding: 16px;
    box-shadow: 0 4px 20px rgba(244,114,182,0.12);
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .input-row { display: flex; gap: 10px; }
  .input-card input[type="text"] {
    flex: 1;
    border: 2px solid #fce7f3;
    border-radius: 16px;
    padding: 10px 16px;
    font-size: 0.95rem;
    outline: none;
    color: #6b4f5e;
    background: #fff8fb;
    transition: border-color 0.2s;
  }
  .input-card input[type="text"]:focus { border-color: #f472b6; background: white; }
  .input-card input[type="text"]::placeholder { color: #f9a8d4; }

  .time-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .time-row label { font-size: 0.82rem; color: #f9a8d4; white-space: nowrap; }
  .time-row input[type="time"] {
    border: 2px solid #fce7f3;
    border-radius: 12px;
    padding: 6px 10px;
    font-size: 0.88rem;
    outline: none;
    color: #6b4f5e;
    background: #fff8fb;
    transition: border-color 0.2s;
  }
  .time-row input[type="time"]:focus { border-color: #f472b6; background: white; }
  .time-sep { color: #f9a8d4; font-size: 0.9rem; }

  .btn-add {
    background: linear-gradient(135deg, #f472b6, #fb7185);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 10px 20px;
    font-size: 1.1rem;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    white-space: nowrap;
  }
  .btn-add:hover { opacity: 0.9; transform: scale(1.03); }
  .btn-add:active { transform: scale(0.97); }

  /* 标签 */
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab {
    flex: 1;
    text-align: center;
    padding: 8px;
    border-radius: 14px;
    cursor: pointer;
    font-size: 0.88rem;
    font-weight: 600;
    transition: all 0.2s;
    background: white;
    color: #f9a8d4;
  }
  .tab.active {
    background: linear-gradient(135deg, #f472b6, #fb7185);
    color: white;
  }

  .section-title {
    font-size: 0.85rem;
    font-weight: 700;
    color: #f472b6;
    letter-spacing: 0.05em;
    margin: 16px 0 8px 4px;
  }

  .task-list { display: flex; flex-direction: column; gap: 8px; }

  .task-item {
    background: white;
    border-radius: 18px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 12px rgba(244,114,182,0.08);
    transition: all 0.25s;
    cursor: pointer;
    border-left: 4px solid #fce7f3;
    animation: pop 0.2s ease;
  }
  .task-item:hover { transform: translateX(3px); box-shadow: 0 4px 16px rgba(244,114,182,0.18); }
  .task-item.done { opacity: 0.5; border-left-color: #86efac; background: #f9fffe; }
  .task-item.done .task-text { text-decoration: line-through; color: #b0a0a8; }
  .task-item.pinned {
    border-left-color: #fb923c;
    background: linear-gradient(135deg, #fff7ed, #ffffff);
    box-shadow: 0 2px 16px rgba(251,146,60,0.15);
  }
  .task-item.pinned .task-text { font-weight: 600; }

  .task-check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid #fce7f3;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 0.75rem;
    transition: all 0.2s;
    background: white;
  }
  .task-item.done .task-check {
    background: linear-gradient(135deg, #86efac, #34d399);
    border-color: #34d399;
    color: white;
  }

  .task-body { flex: 1; min-width: 0; }
  .task-text { font-size: 0.95rem; line-height: 1.4; word-break: break-all; }
  .task-time { font-size: 0.78rem; color: #f472b6; margin-top: 2px; }
  .task-time.no-time { color: #f9a8d4; }

  .pin-badge {
    font-size: 0.72rem;
    color: #fb923c;
    font-weight: 700;
    margin-left: 4px;
    vertical-align: middle;
  }
  .note-dot { margin-left: 4px; font-size: 0.8rem; }

  .btn-pin {
    background: none; border: none;
    font-size: 1rem; cursor: pointer;
    padding: 4px; border-radius: 8px;
    transition: all 0.2s; flex-shrink: 0;
    color: #fce7f3; opacity: 0;
  }
  .task-item:hover .btn-pin { opacity: 1; }
  .btn-pin.pinned { opacity: 1; color: #fb923c; }
  .btn-pin:hover { transform: scale(1.2); }

  .btn-del {
    background: none; border: none;
    color: #fce7f3; font-size: 1rem;
    cursor: pointer; padding: 4px;
    border-radius: 8px; transition: color 0.2s; flex-shrink: 0;
  }
  .btn-del:hover { color: #f87171; }

  .empty { text-align: center; padding: 40px 20px; color: #f9a8d4; font-size: 0.9rem; }
  .empty .emoji { font-size: 2.5rem; display: block; margin-bottom: 8px; }

  /* 复盘 */
  .review-card {
    background: white;
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 4px 20px rgba(244,114,182,0.12);
  }
  .review-stats { display: flex; gap: 12px; margin-bottom: 20px; }
  .stat-box { flex: 1; border-radius: 16px; padding: 14px; text-align: center; }
  .stat-box.done-box { background: linear-gradient(135deg, #d1fae5, #a7f3d0); }
  .stat-box.undone-box { background: linear-gradient(135deg, #fce7f3, #fbcfe8); }
  .stat-box.total-box { background: linear-gradient(135deg, #fff0f5, #fce7f3); }
  .stat-num { font-size: 2rem; font-weight: 700; color: #6b4f5e; }
  .stat-label { font-size: 0.78rem; color: #f472b6; margin-top: 2px; }
  .review-section { margin-top: 16px; }
  .review-section-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; }
  .review-item {
    font-size: 0.88rem; padding: 6px 10px;
    border-radius: 10px; margin-bottom: 4px;
    background: #fff0f5; color: #6b4f5e;
  }
  .review-item.done-item {
    background: #f0fdf4; color: #166534;
    text-decoration: line-through; opacity: 0.8;
  }
  .cheer {
    text-align: center; font-size: 1rem;
    color: #f472b6; font-weight: 600;
    margin-top: 16px; padding: 12px;
    background: linear-gradient(135deg, #fff0f5, #fce7f3);
    border-radius: 14px;
  }

  .btn-clear {
    display: block; width: 100%; margin-top: 12px;
    padding: 10px; border: 2px dashed #fce7f3;
    border-radius: 14px; background: none;
    color: #f9a8d4; font-size: 0.85rem;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-clear:hover { border-color: #f87171; color: #f87171; }

  /* 任务详情弹窗 */
  .modal-mask {
    position: fixed; inset: 0;
    background: rgba(107,79,94,0.3);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    animation: fadeIn 0.18s ease;
  }
  .modal {
    background: white;
    border-radius: 28px;
    padding: 24px;
    width: min(92vw, 420px);
    box-shadow: 0 12px 40px rgba(244,114,182,0.2);
    animation: slideUp 0.22s ease;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .modal-header {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 8px;
  }
  .modal-title {
    font-size: 1.05rem; font-weight: 700;
    color: #6b4f5e; line-height: 1.4; flex: 1;
  }
  .modal-time-badge {
    font-size: 0.78rem; color: white;
    background: linear-gradient(135deg, #f472b6, #fb7185);
    border-radius: 20px; padding: 3px 10px;
    white-space: nowrap; flex-shrink: 0;
  }
  .modal-time-badge.no-time { background: #fce7f3; color: #f9a8d4; }
  .btn-modal-close {
    background: #fce7f3; border: none;
    border-radius: 50%; width: 28px; height: 28px;
    font-size: 0.85rem; cursor: pointer;
    color: #f472b6; flex-shrink: 0; transition: background 0.2s;
  }
  .btn-modal-close:hover { background: #fbcfe8; }
  .modal-note-label { font-size: 0.82rem; color: #f9a8d4; margin-bottom: 4px; }
  .modal-note {
    width: 100%; border: 2px solid #fce7f3;
    border-radius: 14px; padding: 10px 14px;
    font-size: 0.9rem; color: #6b4f5e;
    resize: vertical; min-height: 90px;
    outline: none; font-family: inherit;
    background: #fff8fb; transition: border-color 0.2s;
  }
  .modal-note:focus { border-color: #f472b6; background: white; }
  .modal-note::placeholder { color: #f9a8d4; }
  .modal-quote {
    background: linear-gradient(135deg, #fff0f5, #fce7f3);
    border-radius: 14px; padding: 12px 16px;
    font-size: 0.85rem; color: #f472b6;
    font-weight: 600; text-align: center; line-height: 1.6;
  }
  .modal-actions { display: flex; gap: 8px; }
  .modal-save {
    flex: 1;
    background: linear-gradient(135deg, #f472b6, #fb7185);
    color: white; border: none; border-radius: 14px;
    padding: 10px; font-size: 0.95rem;
    cursor: pointer; transition: opacity 0.2s;
  }
  .modal-save:hover { opacity: 0.88; }
  .btn-ai {
    background: linear-gradient(135deg, #a78bfa, #818cf8);
    color: white; border: none; border-radius: 14px;
    padding: 10px 14px; font-size: 0.88rem;
    cursor: pointer; transition: opacity 0.2s;
    white-space: nowrap;
  }
  .btn-ai:hover { opacity: 0.88; }
  .btn-ai:disabled { opacity: 0.5; cursor: not-allowed; }
  .ai-loading { color: #a78bfa; font-size: 0.82rem; text-align: center; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .btn-ai-review {
    display: block; width: 100%; margin-top: 12px;
    background: linear-gradient(135deg, #a78bfa, #818cf8);
    color: white; border: none; border-radius: 14px;
    padding: 11px; font-size: 0.92rem;
    cursor: pointer; transition: opacity 0.2s;
  }
  .btn-ai-review:hover { opacity: 0.88; }
  .btn-ai-review:disabled { opacity: 0.5; cursor: not-allowed; }
  .ai-review-result {
    margin-top: 12px;
    background: linear-gradient(135deg, #f5f3ff, #ede9fe);
    border-radius: 14px; padding: 14px 16px;
    font-size: 0.88rem; color: #5b4a8a;
    line-height: 1.7; white-space: pre-wrap;
  }

  @keyframes pop {
    0% { transform: scale(0.8); opacity: 0; }
    70% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp {
    from { transform: translateY(24px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>✨ 每日待办小助手</h1>
    <div class="date" id="dateDisplay"></div>
  </div>

  <div class="input-card">
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="输入待办事项…" maxlength="100" />
      <button class="btn-add" onclick="addTask()">＋ 添加</button>
    </div>
    <div class="time-row">
      <label>开始</label>
      <input type="time" id="startTime" />
      <span class="time-sep">→</span>
      <label>结束</label>
      <input type="time" id="endTime" />
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('today')">📋 今日任务</div>
    <div class="tab" onclick="switchTab('review')">📊 每日复盘</div>
  </div>

  <div id="todayView">
    <div id="taskListContainer"></div>
  </div>

  <div id="reviewView" style="display:none">
    <div class="review-card" id="reviewCard"></div>
  </div>
</div>

<!-- 任务详情弹窗 -->
<div class="modal-mask" id="modalMask" style="display:none" onclick="onMaskClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-time-badge" id="modalTimeBadge"></div>
      <button class="btn-modal-close" onclick="closeModal()">✕</button>
    </div>
    <div>
      <div class="modal-note-label">📝 任务备注</div>
      <textarea class="modal-note" id="modalNote" placeholder="写下任务细节、注意事项…"></textarea>
    </div>
    <div id="aiLoadingModal" style="display:none" class="ai-loading">✨ AI 拆解中…</div>
    <div class="modal-quote" id="modalQuote"></div>
    <div id="modalTimeRow" style="display:none">
      <div class="modal-note-label">🕐 设置时间</div>
      <div class="time-row" style="margin-top:4px">
        <label>开始</label>
        <input type="time" id="modalStartTime" />
        <span class="time-sep">→</span>
        <label>结束</label>
        <input type="time" id="modalEndTime" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-ai" id="btnAiBreak" onclick="aiBreakdown()">🤖 AI 拆解</button>
      <button class="modal-save" onclick="saveNote()">保存 ✓</button>
    </div>
  </div>
</div>

<script>
const API_KEY = 'sk-cmeyphnstisyztyizqigluumvrgpcnevctnfvdbhhaubfnpl'; // 替换为你的 SiliconFlow API Key
const API_URL = 'https://api.siliconflow.cn/v1/chat/completions';
const MODEL = 'Qwen/Qwen3-8B';

async function callAI(systemPrompt, userPrompt) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + API_KEY
    },
    body: JSON.stringify({
      model: MODEL,
      messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: userPrompt }
      ],
      max_tokens: 400
    })
  });
  const data = await res.json();
  return data.choices?.[0]?.message?.content?.trim() || '暂时无法获取 AI 回复';
}

// AI 拆解任务
async function aiBreakdown() {
  if (!_modalId) return;
  const t = loadTasks().find(t => t.id === _modalId);
  if (!t) return;
  const btn = document.getElementById('btnAiBreak');
  const loading = document.getElementById('aiLoadingModal');
  btn.disabled = true;
  loading.style.display = 'block';
  try {
    const result = await callAI(
      '你是一个任务规划助手。请将用户的待办事项拆解为3-5个具体可执行的子步骤，每步一行，用序号开头，简洁明了，不超过100字。',
      `待办事项：${t.text}`
    );
    const noteEl = document.getElementById('modalNote');
    noteEl.value = (noteEl.value ? noteEl.value + '\n\n' : '') + '【AI 拆解步骤】\n' + result;
  } catch {
    alert('AI 请求失败，请检查 API Key 是否正确');
  }
  btn.disabled = false;
  loading.style.display = 'none';
}

// AI 复盘评价
async function aiReview() {
  const tasks = loadTasks();
  const done = tasks.filter(t => t.done).map(t => t.text);
  const undone = tasks.filter(t => !t.done).map(t => t.text);
  const btn = document.getElementById('btnAiReview');
  const resultEl = document.getElementById('aiReviewResult');
  btn.disabled = true;
  resultEl.style.display = 'none';
  resultEl.textContent = '';
  try {
    const result = await callAI(
      '你是一个温暖鼓励的生活助手。根据用户今日完成和未完成的任务，给出一段简短（60字以内）、真诚、有温度的鼓励评价，语气轻松可爱。',
      `今日已完成：${done.length ? done.join('、') : '暂无'}\n未完成：${undone.length ? undone.join('、') : '全部完成了'}`
    );
    resultEl.textContent = result;
    resultEl.style.display = 'block';
  } catch {
    alert('AI 请求失败，请检查 API Key 是否正确');
  }
  btn.disabled = false;
}

const QUOTES = [
  '每一个小步骤，都是通向梦想的阶梯。',
  '今天的努力，是明天的底气。',
  '你比自己想象的更有力量。',
  '专注当下，一件一件来。',
  '完成比完美更重要。',
  '慢慢来，比较快。',
  '你已经很棒了，继续加油！',
  '每完成一件事，都值得为自己鼓掌。',
  '行动是治愈焦虑的最好良药。',
  '不必完美，只需前进。',
];

// ── 数据层 ────────────────────────────────────────────────
function todayKey() {
  return 'tasks_' + new Date().toISOString().slice(0, 10);
}
function loadTasks() {
  try { return JSON.parse(localStorage.getItem(todayKey())) || []; } catch { return []; }
}
function saveTasks(tasks) {
  localStorage.setItem(todayKey(), JSON.stringify(tasks));
}
function sortTasks(tasks) {
  return [...tasks].sort((a, b) => {
    if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
    const ta = a.startTime || '99:99';
    const tb = b.startTime || '99:99';
    return ta.localeCompare(tb) || a.createdAt - b.createdAt;
  });
}

// ── 操作 ──────────────────────────────────────────────────
function addTask() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if (!text) return;
  const startTime = document.getElementById('startTime').value;
  const endTime = document.getElementById('endTime').value;
  const tasks = loadTasks();
  tasks.push({ id: Date.now(), text, startTime, endTime, done: false, note: '', pinned: false, createdAt: Date.now() });
  saveTasks(sortTasks(tasks));
  input.value = '';
  document.getElementById('startTime').value = '';
  document.getElementById('endTime').value = '';
  renderToday();
}

function toggleTask(id) {
  const tasks = loadTasks();
  const t = tasks.find(t => t.id === id);
  if (t) t.done = !t.done;
  saveTasks(tasks);
  renderToday();
}

function togglePin(id) {
  const tasks = loadTasks();
  const t = tasks.find(t => t.id === id);
  if (t) t.pinned = !t.pinned;
  saveTasks(sortTasks(tasks));
  renderToday();
}

function deleteTask(id) {
  saveTasks(loadTasks().filter(t => t.id !== id));
  renderToday();
}

function clearAll() {
  if (confirm('确定清空今日所有任务吗？')) {
    localStorage.removeItem(todayKey());
    renderToday();
  }
}

// ── 弹窗 ──────────────────────────────────────────────────
let _modalId = null;

function openModal(id) {
  const t = loadTasks().find(t => t.id === id);
  if (!t) return;
  _modalId = id;
  document.getElementById('modalTitle').textContent = t.text;
  const badge = document.getElementById('modalTimeBadge');
  if (t.startTime) {
    badge.textContent = t.startTime + (t.endTime ? ' → ' + t.endTime : '');
    badge.className = 'modal-time-badge';
  } else {
    badge.textContent = '待安排';
    badge.className = 'modal-time-badge no-time';
  }
  document.getElementById('modalNote').value = t.note || '';
  document.getElementById('modalQuote').textContent = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  // 待安排任务显示时间选择区
  const timeRow = document.getElementById('modalTimeRow');
  if (!t.startTime) {
    timeRow.style.display = 'block';
    document.getElementById('modalStartTime').value = '';
    document.getElementById('modalEndTime').value = '';
  } else {
    timeRow.style.display = 'none';
  }
  document.getElementById('modalMask').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modalMask').style.display = 'none';
  _modalId = null;
}

function onMaskClick(e) {
  if (e.target === document.getElementById('modalMask')) closeModal();
}

function saveNote() {
  if (!_modalId) return;
  const tasks = loadTasks();
  const t = tasks.find(t => t.id === _modalId);
  if (t) {
    t.note = document.getElementById('modalNote').value.trim();
    // 如果是待安排任务，保存时间
    if (!t.startTime) {
      const s = document.getElementById('modalStartTime').value;
      const e = document.getElementById('modalEndTime').value;
      if (s) { t.startTime = s; t.endTime = e; }
    }
  }
  saveTasks(sortTasks(tasks));
  closeModal();
  renderToday();
}

// ── 渲染 ──────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function taskHTML(t) {
  const classes = [t.done ? 'done' : '', t.pinned ? 'pinned' : ''].filter(Boolean).join(' ');
  const pinBadge = t.pinned ? '<span class="pin-badge">置顶</span>' : '';
  const noteDot = t.note ? '<span class="note-dot">📝</span>' : '';
  const timeLabel = t.startTime
    ? `<div class="task-time">🕐 ${t.startTime}${t.endTime ? ' → ' + t.endTime : ''}</div>`
    : `<div class="task-time no-time">待安排</div>`;
  return `
    <div class="task-item ${classes}" onclick="openModal(${t.id})">
      <div class="task-check" onclick="event.stopPropagation();toggleTask(${t.id})">${t.done ? '✓' : ''}</div>
      <div class="task-body">
        <div class="task-text">${escHtml(t.text)}${pinBadge}${noteDot}</div>
        ${timeLabel}
      </div>
      <button class="btn-pin ${t.pinned ? 'pinned' : ''}" title="${t.pinned ? '取消置顶' : '置顶'}" onclick="event.stopPropagation();togglePin(${t.id})">📌</button>
      <button class="btn-del" onclick="event.stopPropagation();deleteTask(${t.id})">✕</button>
    </div>`;
}

function renderToday() {
  const tasks = loadTasks();
  const container = document.getElementById('taskListContainer');
  if (!tasks.length) {
    container.innerHTML = `<div class="empty"><span class="emoji">🌸</span>还没有任务，快来添加吧～</div>`;
    return;
  }
  let html = '';
  const pinned = tasks.filter(t => t.pinned);
  const timed = tasks.filter(t => !t.pinned && t.startTime);
  const untimed = tasks.filter(t => !t.pinned && !t.startTime);
  if (pinned.length) {
    html += `<div class="section-title">⭐ 重要置顶</div><div class="task-list">${pinned.map(taskHTML).join('')}</div>`;
  }
  if (timed.length) {
    html += `<div class="section-title">🕐 按时间排列</div><div class="task-list">${timed.map(taskHTML).join('')}</div>`;
  }
  if (untimed.length) {
    html += `<div class="section-title">📌 待安排</div><div class="task-list">${untimed.map(taskHTML).join('')}</div>`;
  }
  html += `<button class="btn-clear" onclick="clearAll()">🗑️ 清空今日任务</button>`;
  container.innerHTML = html;
}

function renderReview() {
  const tasks = loadTasks();
  const done = tasks.filter(t => t.done);
  const undone = tasks.filter(t => !t.done);
  const total = tasks.length;
  const rate = total ? Math.round(done.length / total * 100) : 0;
  const cheers = ['太棒了，你今天超级努力！🌟','每一个完成都是进步，继续加油！💪','今天的你，值得被表扬！🎉','小步前进，积累大成就！✨','你做到了，明天继续！🌈'];
  const cheer = rate === 100 ? '🎊 全部完成！你今天太厉害了！' : cheers[Math.floor(Math.random() * cheers.length)];
  const doneItems = done.length
    ? done.map(t => `<div class="review-item done-item">${escHtml(t.text)}</div>`).join('')
    : `<div class="review-item" style="color:#f9a8d4">暂无</div>`;
  const undoneItems = undone.length
    ? undone.map(t => `<div class="review-item">${escHtml(t.text)}</div>`).join('')
    : `<div class="review-item" style="color:#f9a8d4">全部完成啦 🎉</div>`;
  document.getElementById('reviewCard').innerHTML = `
    <div class="review-stats">
      <div class="stat-box total-box"><div class="stat-num">${total}</div><div class="stat-label">总任务</div></div>
      <div class="stat-box done-box"><div class="stat-num">${done.length}</div><div class="stat-label">已完成</div></div>
      <div class="stat-box undone-box"><div class="stat-num">${undone.length}</div><div class="stat-label">未完成</div></div>
    </div>
    <div class="review-section">
      <div class="review-section-title">✅ 已完成任务</div>${doneItems}
    </div>
    <div class="review-section">
      <div class="review-section-title">⏳ 未完成任务</div>${undoneItems}
    </div>
    <div class="cheer">${cheer}</div>
    <button class="btn-ai-review" id="btnAiReview" onclick="aiReview()">🤖 AI 生成今日评价</button>
    <div class="ai-review-result" id="aiReviewResult" style="display:none"></div>`;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0 && tab === 'today') || (i === 1 && tab === 'review'));
  });
  document.getElementById('todayView').style.display = tab === 'today' ? '' : 'none';
  document.getElementById('reviewView').style.display = tab === 'review' ? '' : 'none';
  if (tab === 'review') renderReview();
}

// ── 初始化 ────────────────────────────────────────────────
(function init() {
  const now = new Date();
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('dateDisplay').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 · 星期${days[now.getDay()]}`;
  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });
  renderToday();
})();
</script>
</body>
</html>
